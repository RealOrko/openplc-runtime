services:
  openplc-runtime:
    build: .
    image: openplc-runtime:local
    container_name: openplc-runtime
    restart: unless-stopped

    # Explicit port mapping for Docker Desktop on Windows (host networking
    # does not expose ports to localhost on Windows).
    ports:
      - "18443:18443"
      - "14840:14840"
      - "15020:15020"

    environment:
      RUNTIME_REST_PORT: "18443"
      HOST_IP: "127.0.0.1"

    cap_add:
      - SYS_NICE
      - IPC_LOCK

    ulimits:
      memlock: -1
      rtprio: 99

    volumes:
      - openplc-runtime-data:/var/run/runtime

    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import ssl, socket
          s = socket.create_connection(('127.0.0.1', 18443), timeout=5)
          ssl._create_unverified_context().wrap_socket(s, server_hostname='127.0.0.1').close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  water-plant-sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    image: water-plant-sim:local
    container_name: water-plant-sim
    restart: unless-stopped

    environment:
      RUNTIME_REST_PORT: "18443"
      HOST_IP: "openplc-runtime"
      MODEL_DIR: "/app/client/models/water_plant"
      # SIM_MODE: set by start_sim.bat (original=6 scenarios, extended=14 scenarios)
      SIM_MODE: "${SIM_MODE:-original}"

    depends_on:
      openplc-runtime:
        condition: service_healthy

volumes:
  openplc-runtime-data:
