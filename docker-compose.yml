services:
  openplc-runtime:
    # Build locally so modifications to core/src and webserver/ take effect.
    # Swap back to `image: ghcr.io/autonomy-logic/openplc-runtime:latest`
    # (and comment out `build:`) to use the upstream pre-built image.
    build: .
    image: openplc-runtime:local
    container_name: openplc-runtime
    restart: unless-stopped

    # Host networking: the runtime binds the REST API on
    # ${RUNTIME_REST_PORT} (default 18443), OPC-UA on the port from the
    # deployed model's conf/opcua.json (default 14840 for water_plant), and
    # Modbus on the port from conf/modbus_slave.json (default 15020).
    # Ports shift by +10000 from the upstream defaults (8443/4840/5020) so
    # both ports and their -10000 equivalents are free for other services
    # on the host.
    network_mode: host

    environment:
      # REST API port for the webserver (reads from this env var, defaults
      # to 8443 when unset for backward compatibility).
      RUNTIME_REST_PORT: "18443"
      # Host IP for the healthcheck and any outgoing connections. Leave
      # empty to auto-detect via `hostname -I` inside the container.
      HOST_IP: "${HOST_IP:-}"

    # Capabilities required by the real-time runtime:
    #   SYS_NICE  - sched_setscheduler(SCHED_FIFO) in core/src/plc_app/utils/utils.c
    #   IPC_LOCK  - mlockall(MCL_CURRENT|MCL_FUTURE) in the same file
    cap_add:
      - SYS_NICE
      - IPC_LOCK

    # Matching ulimits so the caps can actually be used
    ulimits:
      memlock: -1
      rtprio: 99

    volumes:
      # Persists .env, restapi.db (user accounts), and runtime sockets
      - openplc-runtime-data:/var/run/runtime

    healthcheck:
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import os, ssl, socket, subprocess
          h = os.environ.get('HOST_IP') or subprocess.check_output(['hostname','-I']).decode().split()[0]
          p = int(os.environ.get('RUNTIME_REST_PORT', '18443'))
          s = socket.create_connection((h, p), timeout=5)
          ssl._create_unverified_context().wrap_socket(s, server_hostname=h).close()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  sim-orchestrator:
    # FastAPI service that accepts PLC bundles (program.st + opcua.json +
    # optional sim.py) via HTTP, deploys them to the runtime, and runs the
    # sim as a managed subprocess. Boots as an empty shell — no model is
    # auto-loaded. Clients POST /model to deploy.
    build:
      context: .
      dockerfile: sim-orchestrator/Dockerfile
    image: sim-orchestrator:local
    container_name: sim-orchestrator
    restart: unless-stopped

    # Host networking so the orchestrator reaches the runtime on
    # ${HOST_IP}:${RUNTIME_REST_PORT} and exposes its own API on :19443.
    network_mode: host

    environment:
      PORT: "19443"
      # Leave RUNTIME_URL unset in dev so the entrypoint auto-detects the
      # host IP via `hostname -I` (matches the previous water-plant-sim
      # container's behaviour under host networking). In K8s, set this to
      # the runtime Service DNS name explicitly.
      RUNTIME_REST_PORT: "18443"
      HOST_IP: "${HOST_IP:-}"
      RUNTIME_USERNAME: "openplc"
      RUNTIME_PASSWORD: "openplc"
      DATA_DIR: "/data"

    volumes:
      # PVC-equivalent. Persists /data/current so a container restart
      # resumes the last-loaded bundle (matches the K8s StatefulSet
      # volumeClaimTemplate behaviour).
      - sim-orchestrator-data:/data

    depends_on:
      openplc-runtime:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:19443/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  openplc-runtime-data:
  sim-orchestrator-data:
